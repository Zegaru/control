<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CONTROL</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #05060a;
        color: #7dfc9a;
        font-family: 'JetBrains Mono', Consolas, monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1.2rem;
      }
      .brand {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-shadow: 0 0 12px rgba(125, 252, 154, 0.5);
      }
      .status {
        color: #8a9384;
        font-size: 0.8rem;
        letter-spacing: 0.1em;
      }
      .bar {
        width: 220px;
        height: 3px;
        background: #161a14;
        overflow: hidden;
        border-radius: 2px;
      }
      .bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: #7dfc9a;
        box-shadow: 0 0 8px #7dfc9a;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <div class="brand">CONTROL</div>
    <div class="bar"></div>
    <div class="status" id="status">Starting local daemon…</div>
  </body>
</html>
