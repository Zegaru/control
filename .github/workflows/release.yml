name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish under (e.g. v0.1.1). Builds the selected branch, not the tag commit. Leave empty to build without publishing.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  windows-nsis:
    runs-on: windows-latest
    steps:
      # Tag pushes: github.ref is the tag. Manual "Run workflow": github.ref is
      # the selected branch (usually main), so rebuilds pick up hotfixes without
      # moving the tag. Publish still uses inputs.tag when set.
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.3

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/shell/src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install

      - name: Build shell + NSIS installer
        run: pnpm --filter @control/shell build

      - name: Assemble portable zip
        run: node scripts/make-portable.mjs

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null
          $files = Get-ChildItem -Path apps/shell/src-tauri/target/release/bundle/nsis -Filter *.exe -ErrorAction SilentlyContinue
          if (-not $files) {
            Write-Error "No NSIS installer found under bundle/nsis/"
            Get-ChildItem -Recurse apps/shell/src-tauri/target/release/bundle -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Copy-Item $files.FullName -Destination dist-release/
          Get-ChildItem dist-release/*.exe, dist-release/*.zip | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii dist-release/SHA256SUMS
          Get-ChildItem dist-release | Format-Table Name, Length
          Get-Content dist-release/SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: control-windows-nsis
          path: dist-release/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          name: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            dist-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
